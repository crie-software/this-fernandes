<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F5F3F0">
  <title>Thais Fernandes Fotografia</title>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F5F3F0;
      font-family: 'Playfair Display', serif;
    }
    
    .app-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0; 
      transition: opacity 0.5s ease;
    }

    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F5F3F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .preloader-logo {
      max-width: 160px;
      margin-bottom: 30px;
      animation: pulse 2s infinite ease-in-out;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 4px solid rgba(125, 101, 83, 0.15);
      border-left-color: #7D6553;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 15px;
      color: #8C847A;
      font-size: 0.95rem;
      letter-spacing: 1px;
      font-family: 'Roboto', sans-serif;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse {
      0% { transform: scale(0.98); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(0.98); opacity: 0.9; }
    }
  </style>
</head>
<body>

  <div id="preloader">
    <img src="https://i.postimg.cc/26PdfZcm/IMG-0981.png" alt="Thais Fernandes" class="preloader-logo">
    <div class="spinner"></div>
    <div class="loading-text">Conectando ambiente seguro...</div>
  </div>

  <iframe 
    id="main-app-frame"
    class="app-frame"
    src=""
    allowfullscreen="true">
  </iframe>

  <script>
    // A URL original do seu Google Apps Script
    const gasBaseUrl = "https://script.google.com/macros/s/AKfycbwtpuhRAf6zKMZH4NJFCWJqH0W5F0DEjpAQPkoUsMx7GE2HzfrQbZ4kbDJIkYssmrWq/exec";
    const iframe = document.getElementById('main-app-frame');
    const preloader = document.getElementById('preloader');

    function showPreloader() {
      preloader.style.display = 'flex';
      setTimeout(() => preloader.style.opacity = '1', 10);
      iframe.style.opacity = '0';
    }

    function hidePreloader() {
      preloader.style.opacity = '0';
      iframe.style.opacity = '1';
      setTimeout(() => preloader.style.display = 'none', 600);
    }

    // 1. Oculta a tela de carregamento quando o Iframe termina de renderizar
    iframe.addEventListener('load', hidePreloader);

    // 2. Inicia o aplicativo repassando os parâmetros atuais (ex: ?page=admin)
    iframe.src = gasBaseUrl + window.location.search;

    // 3. Central de escuta de comandos do Google Apps Script
    window.addEventListener("message", function(event) {
      if (!event.data) return;

      // Comando de Login bem-sucedido
      if (event.data.action === "login_success") {
        showPreloader();
        const novosParametros = "?page=client&code=" + event.data.code;
        window.history.pushState({ path: novosParametros }, '', novosParametros);
        iframe.src = gasBaseUrl + novosParametros;
      }
      
      // Comando para Sair/Voltar para a Home
      else if (event.data.action === "navigate_home") {
        showPreloader();
        const urlLimpa = window.location.pathname; // Pega só o caminho (ex: /this-fernandes/)
        window.history.pushState({ path: urlLimpa }, '', urlLimpa);
        iframe.src = gasBaseUrl;
      }
    });
  </script>

</body>
</html>
