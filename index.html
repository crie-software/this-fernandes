<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F5F3F0">
  <title>Thais Fernandes Fotografia</title>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F5F3F0;
    }
    
    .app-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe 
    id="main-app-frame"
    class="app-frame"
    src=""
    allowfullscreen="true"
    sandbox="allow-top-navigation allow-scripts allow-forms allow-same-origin allow-popups">
  </iframe>

  <script>
    // Carrega o sistema do Google com os parâmetros atuais
    const gasBaseUrl = "https://script.google.com/macros/s/AKfycbwtpuhRAf6zKMZH4NJFCWJqH0W5F0DEjpAQPkoUsMx7GE2HzfrQbZ4kbDJIkYssmrWq/exec";
    const urlParams = window.location.search;
    document.getElementById('main-app-frame').src = gasBaseUrl + urlParams;

    // Fica escutando as mensagens enviadas pelo Google Apps Script
    window.addEventListener("message", function(event) {
      // Verifica se a mensagem veio com a ação de sucesso
      if (event.data && event.data.action === "login_success") {
        
        // Agora sim! Redireciona para a pasta correta do seu projeto com o código do cliente
        window.location.href = "https://crie-software.github.io/this-fernandes/?page=client&code=" + event.data.code;
        
      }
    });
  </script>

</body>
</html>
