<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F5F3F0">
  
  <title>Thais Fernandes Fotografia</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/KY9QvD84/Design_sem_nome_1_removebg_preview.png">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/KY9QvD84/Design_sem_nome_1_removebg_preview.png">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Reset fundamental para mobile */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-color: #F5F3F0;
      --dark-leaves: #7D6553;
      --light-leaves: #CFAA6D;
      --text-dark: #2A2A2A;
      --text-muted: #8C847A;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-color);
      font-family: 'Inter', sans-serif;
      /* Previne o pull-to-refresh (arrastar para atualizar) no iOS que quebra a tela */
      overscroll-behavior-y: none; 
    }
    
    .app-frame {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0; 
      transition: opacity 0.5s ease;
    }

    /* Modificado para travar nas 4 pontas da tela, imune às barras do Instagram */
    #preloader, #ios-warning-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9000;
    }

    #preloader {
      transition: opacity 0.6s ease;
    }

    #ios-warning-screen {
      display: none; /* Só aparece via JS */
      z-index: 9999;
      background-color: rgba(245, 243, 240, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .preloader-logo {
      max-width: 140px;
      margin-bottom: 25px;
      animation: pulse 2s infinite ease-in-out;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(125, 101, 83, 0.15);
      border-left-color: var(--dark-leaves);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 15px;
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* Card de Aviso Ultra Responsivo */
    .warning-card {
      background: white;
      border-radius: 20px;
      padding: 35px 20px;
      width: 100%;
      max-width: 340px; /* Largura segura até para iPhone SE */
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      border: 1px solid rgba(125, 101, 83, 0.1);
      margin: auto; /* Força o centro no Flexbox */
    }

    .icon-group {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 2.2rem;
      color: var(--dark-leaves);
    }

    .warning-title {
      font-family: 'Playfair Display', serif;
      color: var(--text-dark);
      font-size: 1.5rem;
      margin: 0 0 10px 0;
    }

    .warning-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .instruction-box {
      background: var(--bg-color);
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      margin-bottom: 20px;
    }

    .instruction-step {
      display: flex;
      align-items: center; /* Alinha ícone e texto no meio */
      gap: 12px;
      margin-bottom: 12px;
      color: var(--text-dark);
      font-size: 0.85rem;
      line-height: 1.3;
    }
    
    .instruction-step:last-child {
      margin-bottom: 0;
    }

    .step-icon {
      background: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark-leaves);
      font-size: 0.8rem;
      flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .btn-copy {
      background: linear-gradient(135deg, var(--light-leaves), var(--dark-leaves));
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      width: 100%;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-copy:active {
      transform: scale(0.96);
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse {
      0% { transform: scale(0.98); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(0.98); opacity: 0.9; }
    }
  </style>
</head>
<body>

  <div id="ios-warning-screen">
    <div class="warning-card">
      <div class="icon-group">
        <i class="fab fa-apple"></i>
        <i class="fas fa-times" style="font-size: 1rem; color: #dc3545;"></i>
        <i class="fab fa-instagram"></i>
      </div>
      <h2 class="warning-title">Ação Necessária</h2>
      <p class="warning-text">
        O sistema de segurança do iPhone bloqueia galerias dentro do Instagram. Para acessar suas fotos:
      </p>
      
      <div class="instruction-box">
        <div class="instruction-step">
          <div class="step-icon"><i class="fas fa-ellipsis-h"></i></div>
          <div>Toque nos <strong>3 pontinhos</strong> no canto superior da tela.</div>
        </div>
        <div class="instruction-step">
          <div class="step-icon"><i class="fab fa-safari"></i></div>
          <div>Escolha <strong>"Abrir no Safari"</strong> ou navegador padrão.</div>
        </div>
      </div>

      <button class="btn-copy" onclick="copiarLinkSite(this)">
        <i class="far fa-copy"></i> Copiar Link do Site
      </button>
    </div>
  </div>

  <div id="preloader">
    <img src="https://i.postimg.cc/26PdfZcm/IMG-0981.png" alt="Thais Fernandes" class="preloader-logo">
    <div class="spinner"></div>
    <div class="loading-text">Conectando ambiente seguro...</div>
  </div>

  <iframe 
    id="main-app-frame"
    class="app-frame"
    src=""
    allowfullscreen="true">
  </iframe>

  <script>
    // --- 1. Lógica de Detecção Inteligente (Apenas iOS + Instagram) ---
    const ua = navigator.userAgent.toLowerCase();
    const isInstagram = ua.includes('instagram');
    const isIOS = /iphone|ipad|ipod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    if (isInstagram && isIOS) {
      // Trava o usuário na tela de aviso alterando o display para 'flex'
      document.getElementById('ios-warning-screen').style.display = 'flex';
      document.getElementById('preloader').style.display = 'none'; 
    } else {
      // É Android, ou já está no Safari/Chrome. Libera o acesso!
      iniciarAplicativo();
    }

    // --- 2. Função "Plano B" (Copiar link) ---
    function copiarLinkSite(btn) {
      const link = window.location.href;
      
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(link).then(() => {
          mostrarSucessoCopia(btn);
        });
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = link;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy");
        textArea.remove();
        mostrarSucessoCopia(btn);
      }
    }

    function mostrarSucessoCopia(btn) {
      const originalText = btn.innerHTML;
      btn.style.background = "#28a745"; // Verde sucesso
      btn.innerHTML = '<i class="fas fa-check"></i> Link Copiado!';
      setTimeout(() => {
        btn.style.background = ""; // Volta pro gradiente original
        btn.innerHTML = originalText;
      }, 3000);
    }

    // --- 3. Lógica Principal do Aplicativo ---
    function iniciarAplicativo() {
      const gasBaseUrl = "https://script.google.com/macros/s/AKfycbwtpuhRAf6zKMZH4NJFCWJqH0W5F0DEjpAQPkoUsMx7GE2HzfrQbZ4kbDJIkYssmrWq/exec";
      const iframe = document.getElementById('main-app-frame');
      const preloader = document.getElementById('preloader');

      function showPreloader() {
        preloader.style.display = 'flex';
        setTimeout(() => preloader.style.opacity = '1', 10);
        iframe.style.opacity = '0';
      }

      function hidePreloader() {
        preloader.style.opacity = '0';
        iframe.style.opacity = '1';
        setTimeout(() => preloader.style.display = 'none', 600);
      }

      iframe.addEventListener('load', hidePreloader);
      iframe.src = gasBaseUrl + window.location.search;

      window.addEventListener("message", function(event) {
        if (!event.data) return;

        if (event.data.action === "login_success") {
          showPreloader();
          const novosParametros = "?page=client&code=" + event.data.code;
          window.history.pushState({ path: novosParametros }, '', novosParametros);
          iframe.src = gasBaseUrl + novosParametros;
        }
        
        else if (event.data.action === "navigate_home") {
          showPreloader();
          const urlLimpa = window.location.pathname; 
          window.history.pushState({ path: urlLimpa }, '', urlLimpa);
          iframe.src = gasBaseUrl;
        }
      });
    }
  </script>

</body>
</html>
