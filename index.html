    /* Reset básico para zerar margens e evitar scrollbars brancas sobrando */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Bloqueia o scroll da página mãe, deixando só o scroll do próprio app/iframe */
      background-color: #ffffff; /* Cor de fundo enquanto o iframe carrega */
    }

    /* Estilo do iframe moderno */
    .app-frame {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
