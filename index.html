<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F5F3F0">
  <title>Thais Fernandes Fotografia</title>
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F5F3F0;
      font-family: 'Arial', sans-serif;
    }
    
    .app-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0; /* Começa invisível */
      transition: opacity 0.5s ease;
    }

    /* Tela de Carregamento (Preloader) */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #F5F3F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .preloader-logo {
      max-width: 160px;
      margin-bottom: 30px;
      animation: pulse 2s infinite ease-in-out;
    }

    /* Spinner Animado com as cores da sua marca */
    .spinner {
      width: 45px;
      height: 45px;
      border: 4px solid rgba(125, 101, 83, 0.15); /* Fundo clarinho */
      border-left-color: #7D6553; /* Cor principal (dark-leaves) */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 15px;
      color: #8C847A;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(0.98); opacity: 0.9; }
      50% { transform: scale(1.02); opacity: 1; }
      100% { transform: scale(0.98); opacity: 0.9; }
    }
  </style>
</head>
<body>

  <div id="preloader">
    <img src="https://i.postimg.cc/26PdfZcm/IMG-0981.png" alt="Thais Fernandes" class="preloader-logo">
    <div class="spinner"></div>
    <div class="loading-text">Conectando ambiente seguro...</div>
  </div>

  <iframe 
    id="main-app-frame"
    class="app-frame"
    src=""
    allowfullscreen="true">
  </iframe>

  <script>
    // 1. Carrega o sistema do Google com os parâmetros atuais
    const gasBaseUrl = "https://script.google.com/macros/s/AKfycbwtpuhRAf6zKMZH4NJFCWJqH0W5F0DEjpAQPkoUsMx7GE2HzfrQbZ4kbDJIkYssmrWq/exec";
    const urlParams = window.location.search;
    const iframe = document.getElementById('main-app-frame');
    const preloader = document.getElementById('preloader');
    
    // 2. Quando o Google avisar que a tela dele terminou de carregar por completo...
    iframe.addEventListener('load', function() {
      // Faz o preloader desaparecer suavemente
      preloader.style.opacity = '0';
      // Mostra o iframe do aplicativo suavemente
      iframe.style.opacity = '1';
      
      // Remove o preloader do caminho após a animação (0.6s)
      setTimeout(function() {
        preloader.style.display = 'none';
      }, 600);
    });

    // 3. Injeta o link no iframe para começar a baixar
    iframe.src = gasBaseUrl + urlParams;

    // 4. Continua escutando o postMessage para o redirecionamento pós-login
    window.addEventListener("message", function(event) {
      if (event.data && event.data.action === "login_success") {
        // Mostra o preloader de novo enquanto redireciona
        preloader.style.display = 'flex';
        setTimeout(() => preloader.style.opacity = '1', 10);
        
        window.location.href = "https://crie-software.github.io/this-fernandes/?page=client&code=" + event.data.code;
      }
    });
  </script>

</body>
</html>
